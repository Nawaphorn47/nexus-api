# docker-compose.yml
version: '3.8'

services:
  # 1. PostgreSQL Database
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: nexus_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # 2. Node.js Express App
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:supersecretpassword@db:5432/nexus_db?schema=public
      - JWT_SECRET=my_super_secret_jwt_key_2026
    ports:
      - "3000:3000"
    volumes:
      # Mount source code เข้าไป เพื่อให้แก้โค้ดแล้วอัปเดตทันที (Hot Reload)
      - .:/usr/src/app
      # ป้องกันไม่ให้ node_modules ในเครื่องไปทับใน Container
      - /usr/src/app/node_modules
    depends_on:
      - db
    # ใช้ ts-node-dev เพื่อการรัน TypeScript ในโหมด Dev แบบรวดเร็ว
    command: npm run dev

  # 3. Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api

volumes:
  pgdata: # เก็บข้อมูล Database ไว้ไม่ให้หายเมื่อปิด Container